id: no-db-string-literal-password
language: Python
message: "Database connection should use a secure (non-empty) password"
severity: error
note: |
  Port of SonarCloud python:S2115 (BLOCKER VULNERABILITY).

  Database passwords should come from environment variables or
  a secrets manager, not from string literals. Empty strings
  are especially dangerous — some drivers treat empty-password
  as "trust the server" mode.

  Matches database connection calls (connect, create_engine,
  sqlite3.connect, pymysql.connect, etc.) that have a
  `password=` keyword argument whose value is a STRING LITERAL
  (not a variable reference or os.environ subscript).

  Style: kind match on `call`, regex on the call's function
  name. The `has: keyword_argument` traverses to the kwarg
  node; nested `has: kind: string` checks the RHS is a literal
  (not identifier or subscript); `not: has: kind: subscript`
  excludes cases like `password=os.environ["DB_PASSWORD"]`
  where the value contains a string subscript (env var lookup
  is fine — that's not a hardcoded literal).

  This is a conservative partial port — S2115 in full would
  also check for SSL/TLS configuration and other secure
  connection options.
metadata:
  sonar: S2115
rule:
  kind: call
  regex: '^(connect|create_engine|sqlite3\.connect|psycopg2\.connect|pymysql\.connect|MySQLdb\.connect)'
  has:
    kind: keyword_argument
    regex: '^password\s*='
    stopBy: end
    has:
      kind: string
      stopBy: end
    not:
      has:
        kind: subscript
        stopBy: end
