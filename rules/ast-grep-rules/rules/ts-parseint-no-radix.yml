# Rewritten rule using pattern matching instead of nthChild:
id: ts-parseint-no-radix
language: typescript
severity: warning
message: parseInt(x) without radix - use parseInt(x, 10)
metadata:
  weight: 2
  category: slop
rule:
  pattern: "parseInt($X)"
  not:
    pattern: "parseInt($X, $RADIX)"
