id: no-console-except-error
language: TypeScript
severity: warning
message: "Avoid console.log/debug/warn in production code — use a logger or console.error inside catch only"
note: |
  console.log/debug/warn usually indicate leftover debug output shipped to
  production. Allow console.error ONLY inside catch blocks (logging the
  error there is useful for production triage).
rule:
  any:
    - pattern: console.error($$$)
      not:
        inside:
          kind: catch_clause
          stopBy: end
    - pattern: console.$METHOD($$$)
constraints:
  METHOD:
    regex: "log|debug|warn"
fix: ""
