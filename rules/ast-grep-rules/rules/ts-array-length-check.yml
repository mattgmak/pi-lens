id: ts-array-length-check
language: typescript
severity: warning
message: arr.length > 0 - use truthiness if (arr) or arr.length
metadata:
  weight: 2
  category: slop
rule:
  kind: binary_expression
  any:
  - pattern: "$ARR.length > 0"
  - pattern: "$ARR.length !== 0"
  - pattern: "$ARR.length >= 1"
