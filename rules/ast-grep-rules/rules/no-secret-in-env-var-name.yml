id: no-secret-in-env-var-name
language: python
message: "Secrets should not be hard-coded — use environment variables or a secrets manager"
severity: warning
note: |-
  [CWE-798]: Use of Hard-coded Credentials [A07:2021]: Identification
  and Authentication Failures. Port of SonarCloud python:S6418
  (BLOCKER VULNERABILITY).

  A broader version of `no-hardcoded-password`. Catches string
  literals assigned to variables whose names suggest they hold
  credentials: `secret`, `password`, `passwd`, `token`, `apikey`,
  `api_key`, `access_key`, `private_key`, `auth_token`,
  `bearer_token`.

  Style matches CodeRabbit's idiom:
  - Match `kind: assignment` and traverse via `has: kind:
    identifier, stopBy: end` for the LHS identifier check.
  - The `(?i)` case-insensitive flag covers `PASSWORD` /
    `Password` / `password`. CodeRabbit uses the same
    convention in their generic password rules.
  - `has: kind: string` (without `stopBy: end`) restricts the
    string check to direct children of the assignment — this
    skips cases where the RHS is a complex expression like
    `os.environ["DB_PASSWORD"]` (no direct string child).
ast-grep-essentials: true
metadata:
  sonar: S6418
rule:
  all:
    - kind: assignment
    - has:
        kind: identifier
        regex: '(?i)^(secret|password|passwd|token|api_key|apikey|access_key|private_key|auth_token|bearer_key|bearer_token)$'
        stopBy: end
    - has:
        kind: string
