id: no-implied-eval-js
language: JavaScript
message: "Avoid implied eval via setTimeout/setInterval with string arguments"
severity: error
note: |
  Passing strings to setTimeout() or setInterval() is equivalent to eval()
  and can execute arbitrary code. Pass a function reference instead.
  The `, $$$REST` suffix matches the optional delay/args tail of
  setTimeout/setInterval — without it the pattern only catches the
  rare 1-argument form.
rule:
  any:
    - pattern: setTimeout("$STRING", $$$REST)
    - pattern: setTimeout('$STRING', $$$REST)
    - pattern: setInterval("$STRING", $$$REST)
    - pattern: setInterval('$STRING', $$$REST)
