id: no-hardcoded-password
language: python
message: "Passwords should not be hardcoded — use environment variables or a secrets manager"
severity: warning
note: |-
  [CWE-798]: Use of Hard-coded Credentials [A07:2021]: Identification
  and Authentication Failures. Port of SonarCloud python:S6437
  (BLOCKER VULNERABILITY).

  A generic version of CodeRabbit's library-specific hardcoded-secret
  rules (mysql-*, postgres-*, cassandra-*, redis-*, etc). CodeRabbit has
  24 Python hardcoded-secret rules but ALL are library-specific; no
  generic `password=` / `passwd=` / `secret=` kwarg detector exists in
  their baseline. This rule fills that gap.

  Style notes — matches CodeRabbit's idiom:
  - Match `kind: call` and traverse via `has: kind: keyword_argument,
    stopBy: end` (stopBy is required because the kwarg is wrapped in
    `argument_list`, not a direct call child).
  - The string literal check is structural: `kind: string + regex: ^.{6,}$`
    to filter empty strings. CodeRabbit uses a deeper
    string_start/string_content/string_end triple via nthChild — we
    keep the simpler regex here because the literal-vs-variable
    distinction is already enforced by matching `kind: string` (a
    string LITERAL, not an identifier).
  - The identifier check is on the `kind: identifier` AST node, not
    the kwarg text — more idiomatic than text regex.
ast-grep-essentials: true
metadata:
  sonar: S6437
rule:
  kind: call
  has:
    kind: keyword_argument
    stopBy: end
    all:
      - has:
          kind: identifier
          regex: '(?i)^(password|passwd|secret)$'
      - has:
          kind: string
          regex: '^.{6,}$'
