# Requests with verify=False
# Detects TLS verification disabled on requests calls (CWE-295).
# autoaudit PY010.
id: no-requests-verify-false
language: Python
severity: warning
message: "requests call has verify=False — TLS certificate verification disabled"
note: |
  Passing verify=False disables certificate validation, exposing the
  connection to MITM attacks.
rule:
  any:
    - pattern: requests.$FN($$$ARGS, verify=False, $$$REST)
    - pattern: requests.$FN($$$ARGS, $$$BEFORE, verify=False)
    - pattern: requests.$FN(verify=False)
has_fix: false
tags:
  - python
  - security
  - tls
  - verification
  - cwe-295
examples:
  bad: |
    r = requests.get("https://api.example.com", verify=False)
  good: |
    r = requests.get("https://api.example.com")
