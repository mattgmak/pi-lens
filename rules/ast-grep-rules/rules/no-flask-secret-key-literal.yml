id: no-flask-secret-key-literal
language: python
message: "Flask secret keys should not be hardcoded — use environment variables or a secrets manager"
severity: error
note: |-
  [CWE-798]: Use of Hard-coded Credentials [A07:2021]: Identification
  and Authentication Failures. Port of SonarCloud python:S6779
  (BLOCKER VULNERABILITY).

  Hardcoded Flask `secret_key` ends up in version control. Use
  `os.environ.get("SECRET_KEY")` or a secrets manager.

  Note: CodeRabbit has `hashids-with-flask-secret-python` which
  is a different pattern (matches `Hashids(salt=app.secret_key)`
  — i.e. using the Flask secret as a Hashids salt). CodeRabbit
  does NOT cover the direct `app.secret_key = "literal"`
  assignment this rule catches.

  Style notes — pattern-based (no regex):
  - Match the literal string assignment via pattern matching
    `$APP.secret_key = "$LITERAL"` and `$APP.secret_key = '$LITERAL'`.
    We match the LITERAL form (not arbitrary `$KEY`) so that
    `app.secret_key = os.environ['SECRET_KEY']` is correctly NOT
    flagged — the secret value comes from the environment.
  - Two variants cover both single- and double-quoted string
    literals. Pattern matching on quoted strings works directly
    in ast-grep's matcher.
ast-grep-essentials: true
metadata:
  sonar: S6779
rule:
  any:
    - pattern: '$APP.secret_key = "$LITERAL"'
    - pattern: "$APP.secret_key = '$LITERAL'"
    - pattern: '$APP.config["SECRET_KEY"] = "$LITERAL"'
    - pattern: "$APP.config['SECRET_KEY'] = '$LITERAL'"
