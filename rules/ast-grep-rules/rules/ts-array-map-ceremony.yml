id: ts-array-map-ceremony
language: typescript
severity: warning
message: Array.from(arr) or arr.map(x => x) is unnecessary ceremony - use arr directly
metadata:
  weight: 2
  category: slop
rule:
  any:
  - kind: call_expression
    pattern: "Array.from($ARR)"
    not:
      has:
        kind: arguments
  - kind: arrow_function
    pattern: "$ARR.map(x => x)"
