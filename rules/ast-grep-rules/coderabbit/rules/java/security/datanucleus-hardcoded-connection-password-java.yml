id: datanucleus-hardcoded-connection-password-java
severity: warning
language: java
message: >-
  A secret is hard-coded in the application. Secrets stored in source code, such as credentials, identifiers, and other
  types of sensitive data, can be leaked and used by internal or external malicious actors. Use environment variables to
  securely provide credentials and other secrets or retrieve them from a secure vault or Hardware Security Module (HSM).
note: |-
  [CWE-798] Use of Hard-coded Credentials. [REFERENCES]
      - https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html
      - https://db.apache.org/jdo/api30/apidocs/javax/jdo/PersistenceManagerFactory.html
ast-grep-essentials: true
utils:
  org_datanucleus_api_jdo_JDOPersistenceManagerFactory_JDO_SETPASS:
    kind: identifier
    regex: ^setConnectionPassword$
    all:
      - precedes:
          kind: argument_list
          has:
            kind: string_literal
            has:
              kind: string_fragment
          not:
            has:
              nthChild:
                position: 2
                ofRule:
                  not:
                    kind: line_comment
      - inside:
          stopBy: end
          kind: method_invocation
          has:
            stopBy: end
            kind: identifier
            pattern: $INST
            nthChild: 1
      - inside:
          stopBy: end
          follows:
            stopBy: end
            any:
              - kind: local_variable_declaration
              - kind: field_declaration
            all:
              - has:
                  kind: scoped_type_identifier
                  regex: ^org.datanucleus.api.jdo.JDOPersistenceManagerFactory$
              - has:
                  kind: variable_declarator
                  has:
                    kind: identifier
                    pattern: $INST
