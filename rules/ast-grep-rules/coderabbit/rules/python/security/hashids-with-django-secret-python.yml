id: hashids-with-django-secret-python
language: python
severity: warning
message: >-
  The Django secret key is used as salt in HashIDs. The HashID mechanism is not secure. By observing sufficient HashIDs,
  the salt used to construct them can be recovered. This means the Django secret key can be obtained by attackers,
  through the HashIDs.
note: |-
  [CWE-327]: Use of a Broken or Risky Cryptographic Algorithm [OWASP A02:2021]: Cryptographic Failures [REFERENCES]
       https://docs.djangoproject.com/en/4.2/ref/settings/#std-setting-SECRET_KEY
       http://carnage.github.io/2015/08/cryptanalysis-of-hashids
ast-grep-essentials: true
utils:
  Hashids_salt_settings_SECRET_KEY_min_length_settings_ID_HASH_MIN_LENGTH:
    kind: call
    all:
      - has:
          kind: identifier
          nthChild: 1
          regex: ^Hashids$
      - has:
          kind: argument_list
          nthChild: 2
          has:
            kind: keyword_argument
            all:
              - has:
                  kind: identifier
                  regex: ^salt$
              - has:
                  kind: attribute
                  all:
                    - has:
                        kind: identifier
                        regex: ^settings$
                        nthChild: 1
                    - has:
                        kind: identifier
                        nthChild: 2
                        regex: ^SECRET_KEY$
      - all:
          - any:
              - inside:
                  stopBy: end
                  follows:
                    stopBy: end
                    kind: import_from_statement
                    pattern: from django.conf import settings
              - follows:
                  stopBy: end
                  kind: import_from_statement
                  pattern: from django.conf import settings
          - any:
              - inside:
                  stopBy: end
                  follows:
                    stopBy: end
                    kind: import_from_statement
                    pattern: from hashids import Hashids
              - follows:
                  stopBy: end
                  kind: import_from_statement
                  pattern: from hashids import Hashids
