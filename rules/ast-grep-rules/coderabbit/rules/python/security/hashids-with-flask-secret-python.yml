id: hashids-with-flask-secret-python
severity: warning
language: python
message: >-
  The Flask secret key is used as salt in HashIDs. The HashID mechanism is not secure. By observing sufficient HashIDs,
  the salt used to construct them can be recovered. This means the Flask secret key can be obtained by attackers,
  through the HashIDs).
note: |-
  [CWE-327] Use of a Broken or Risky Cryptographic Algorithm. [REFERENCES]
      - https://flask.palletsprojects.com/en/2.2.x/config/#SECRET_KEY
      - http://carnage.github.io/2015/08/cryptanalysis-of-hashids
ast-grep-essentials: true
utils:
  hashids_Hashids_salt_flask_current_app_config_SECRET_KEY:
    kind: call
    all:
      - has:
          stopBy: neighbor
          kind: attribute
          regex: ^hashids.Hashids$
      - has:
          stopBy: neighbor
          kind: argument_list
          has:
            stopBy: end
            kind: keyword_argument
            all:
              - has:
                  stopBy: neighbor
                  kind: identifier
                  regex: ^salt$
              - has:
                  stopBy: neighbor
                  kind: subscript
                  pattern: flask.current_app.config['SECRET_KEY']
  hashids_Hashids_flask_current_app_config_SECRET_KEY:
    kind: call
    all:
      - has:
          stopBy: neighbor
          kind: attribute
          regex: ^hashids.Hashids$
      - has:
          stopBy: neighbor
          kind: argument_list
          has:
            stopBy: neighbor
            kind: subscript
            pattern: flask.current_app.config['SECRET_KEY']
  hashids_Hashids_APP_config_SECRET_KEY:
    kind: call
    all:
      - has:
          stopBy: neighbor
          kind: attribute
          regex: ^hashids.Hashids$
      - has:
          stopBy: neighbor
          kind: argument_list
          has:
            stopBy: neighbor
            kind: subscript
            pattern: $APP.config['SECRET_KEY']
      - inside:
          stopBy: end
          kind: module
          has:
            stopBy: end
            kind: expression_statement
            has:
              stopBy: neighbor
              kind: assignment
              pattern: $APP = flask.Flask($$$)
  hashids_Hashids_salt_APP_config_SECRET_KEY:
    kind: call
    all:
      - has:
          stopBy: neighbor
          kind: attribute
          regex: ^hashids.Hashids$
      - has:
          stopBy: neighbor
          kind: argument_list
          has:
            stopBy: end
            kind: keyword_argument
            all:
              - has:
                  stopBy: neighbor
                  kind: identifier
                  regex: ^salt$
              - has:
                  stopBy: neighbor
                  kind: subscript
                  pattern: $APP.config['SECRET_KEY']
      - inside:
          stopBy: end
          kind: module
          has:
            stopBy: end
            kind: expression_statement
            has:
              stopBy: neighbor
              kind: assignment
              pattern: $APP = flask.Flask($$$)
  Hashids_salt_app_config_SECRET_KEY:
    kind: call
    all:
      - has:
          stopBy: neighbor
          kind: identifier
          regex: ^Hashids$
      - has:
          stopBy: neighbor
          kind: argument_list
          has:
            stopBy: end
            kind: keyword_argument
            all:
              - has:
                  stopBy: neighbor
                  kind: identifier
                  regex: ^salt$
              - has:
                  stopBy: neighbor
                  kind: subscript
                  pattern: $APP.config['SECRET_KEY']
      - inside:
          stopBy: end
          kind: module
          all:
            - has:
                stopBy: end
                kind: import_from_statement
                pattern: from hashids import Hashids
            - any:
                - has:
                    stopBy: end
                    kind: import_from_statement
                    pattern: from flask import current_app as $APP
                - has:
                    stopBy: end
                    kind: expression_statement
                    has:
                      stopBy: end
                      kind: assignment
                      pattern: $APP = Flask($$$)
  Hashids_salt_current_app_config_SECRET_KEY:
    kind: call
    all:
      - has:
          stopBy: neighbor
          kind: identifier
          regex: ^Hashids$
      - has:
          stopBy: neighbor
          kind: argument_list
          has:
            stopBy: end
            kind: keyword_argument
            all:
              - has:
                  stopBy: neighbor
                  kind: identifier
                  regex: ^salt$
              - has:
                  stopBy: neighbor
                  kind: subscript
                  pattern: current_app.config['SECRET_KEY']
      - inside:
          stopBy: end
          kind: module
          all:
            - has:
                stopBy: end
                kind: import_from_statement
                pattern: from hashids import Hashids
            - has:
                stopBy: end
                kind: import_from_statement
                pattern: from flask import current_app
rule:
  kind: call
  any:
    - matches: hashids_Hashids_salt_flask_current_app_config_SECRET_KEY
    - matches: hashids_Hashids_flask_current_app_config_SECRET_KEY
    - matches: hashids_Hashids_APP_config_SECRET_KEY
    - matches: hashids_Hashids_salt_APP_config_SECRET_KEY
    - matches: Hashids_salt_app_config_SECRET_KEY
    - matches: Hashids_salt_current_app_config_SECRET_KEY
