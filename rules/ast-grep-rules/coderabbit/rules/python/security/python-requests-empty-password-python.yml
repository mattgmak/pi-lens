id: python-requests-empty-password-python
severity: warning
language: python
message: >-
  The application creates a database connection with an empty password. This can lead to unauthorized access by either
  an internal or external malicious actor. To prevent this vulnerability, enforce authentication when connecting to a
  database by using environment variables to securely provide credentials or retrieving them from a secure vault or HSM
  (Hardware Security Module).
note: |-
  [CWE-287] Improper Authentication. [REFERENCES]
      - https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html
ast-grep-essentials: true
utils:
  requests_auth_HTTPBasicAuth_USER:
    kind: call
    all:
      - has:
          stopBy: neighbor
          kind: attribute
          regex: ^requests.auth.HTTPBasicAuth$|^requests.auth.HTTPDigestAuth$|^requests.auth.HTTPProxyAuth$
      - has:
          stopBy: neighbor
          kind: argument_list
          has:
            stopBy: neighbor
            kind: string
            nthChild: 2
            not:
              has:
                stopBy: end
                kind: string_content
rule:
  kind: call
  matches: requests_auth_HTTPBasicAuth_USER
  not:
    all:
      - has:
          stopBy: end
          kind: ERROR
      - inside:
          stopBy: end
          kind: ERROR
