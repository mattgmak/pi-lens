id: python-requests-oauth-hardcoded-secret-python
language: python
severity: warning
message: >-
  A secret is hard-coded in the application. Secrets stored in source code, such as credentials, identifiers, and other
  types of sensitive data, can be leaked and used by internal or external malicious actors. Use environment variables to
  securely provide credentials and other secrets or retrieve them from a secure vault or Hardware Security Module (HSM).
note: |-
  [CWE-798]: Use of Hard-coded Credentials [OWASP A07:2021]: Identification and Authentication Failures [REFERENCES]
       https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html
ast-grep-essentials: true
utils:
  requests_oauthlib_OAuth1_KEY:
    kind: call
    all:
      - has:
          kind: attribute
          regex: ^requests_oauthlib.OAuth1$
      - has:
          kind: argument_list
          has:
            kind: string
            has:
              kind: string_content
            any:
              - nthChild:
                  position: 2
                  ofRule:
                    not:
                      kind: comment
              - nthChild:
                  position: 4
                  ofRule:
                    not:
                      kind: comment
  requests_oauthlib_OAuth1_KEY__with_Instance:
    kind: call
    all:
      - has:
          kind: attribute
          regex: ^requests_oauthlib.OAuth1$
      - has:
          kind: argument_list
          has:
            kind: identifier
            pattern: $STR
            any:
              - nthChild:
                  position: 2
                  ofRule:
                    not:
                      kind: comment
              - nthChild:
                  position: 4
                  ofRule:
                    not:
                      kind: comment
      - inside:
          stopBy: end
          follows:
            stopBy: end
            kind: expression_statement
            has:
              kind: assignment
              all:
                - has:
                    kind: identifier
                    pattern: $STR
                - has:
                    kind: string
                    has:
                      kind: string_content
  OAuth1_KEY:
    kind: call
    all:
      - has:
          kind: identifier
          regex: ^OAuth1$
      - has:
          kind: argument_list
          has:
            kind: string
            has:
              kind: string_content
            any:
              - nthChild:
                  position: 2
                  ofRule:
                    not:
                      kind: comment
              - nthChild:
                  position: 4
                  ofRule:
                    not:
                      kind: comment
      - inside:
          stopBy: end
          follows:
            stopBy: end
            kind: import_from_statement
            pattern: from requests_oauthlib import OAuth1
  OAuth1_KEY__with_Instance:
    kind: call
    all:
      - has:
          kind: identifier
          regex: ^OAuth1$
      - has:
          kind: argument_list
          has:
            kind: identifier
            pattern: $STR
            any:
              - nthChild:
                  position: 2
                  ofRule:
                    not:
                      kind: comment
              - nthChild:
                  position: 4
                  ofRule:
                    not:
                      kind: comment
      - inside:
          stopBy: end
          follows:
            stopBy: end
            kind: expression_statement
            has:
              kind: assignment
              all:
                - has:
                    kind: identifier
                    pattern: $STR
                - has:
                    kind: string
                    has:
                      kind: string_content
      - inside:
          stopBy: end
          follows:
            stopBy: end
            kind: import_from_statement
            pattern: from requests_oauthlib import OAuth1
  OAUTH_fetch_token_client_secret:
    kind: call
    all:
      - has:
          kind: attribute
          all:
            - has:
                kind: identifier
                pattern: $OAUTH
                nthChild: 1
            - has:
                kind: identifier
                regex: ^fetch_token$
                nthChild: 2
      - has:
          kind: argument_list
          has:
            kind: keyword_argument
            all:
              - has:
                  kind: identifier
                  nthChild: 1
                  regex: ^client_secret$
              - has:
                  kind: string
                  has:
                    kind: string_content
                  nthChild: 2
      - inside:
          stopBy: end
          follows:
            stopBy: end
            kind: expression_statement
            has:
              kind: assignment
              all:
                - has:
                    kind: identifier
                    nthChild: 1
                    pattern: $OAUTH
                - has:
                    kind: call
                    has:
                      kind: identifier
                      regex: ^OAuth2Session$
      - inside:
          stopBy: end
          follows:
            stopBy: end
            kind: import_from_statement
            pattern: from requests_oauthlib import OAuth2Session
  OAUTH_fetch_token_client_secret__with_Instance:
    kind: call
    all:
      - has:
          kind: attribute
          all:
            - has:
                kind: identifier
                pattern: $OAUTH
                nthChild: 1
            - has:
                kind: identifier
                regex: ^fetch_token$
                nthChild: 2
      - has:
          kind: argument_list
          has:
            kind: keyword_argument
            all:
              - has:
                  kind: identifier
                  nthChild: 1
                  regex: ^client_secret$
              - has:
                  kind: identifier
                  pattern: $STR
                  nthChild: 2
      - inside:
          stopBy: end
          follows:
            stopBy: end
            kind: expression_statement
            has:
              kind: assignment
              all:
                - has:
                    kind: identifier
                    nthChild: 1
                    pattern: $OAUTH
                - has:
                    kind: call
                    has:
                      kind: identifier
                      regex: ^OAuth2Session$
      - inside:
          stopBy: end
          follows:
            stopBy: end
            kind: import_from_statement
            pattern: from requests_oauthlib import OAuth2Session
      - inside:
          stopBy: end
          follows:
            stopBy: end
            kind: expression_statement
            has:
              kind: assignment
              all:
                - has:
                    kind: identifier
                    pattern: $STR
                - has:
                    kind: string
                    has:
                      kind: string_content
rule:
  kind: call
  any:
    - matches: requests_oauthlib_OAuth1_KEY
    - matches: requests_oauthlib_OAuth1_KEY__with_Instance
    - matches: OAuth1_KEY
    - matches: OAuth1_KEY__with_Instance
    - matches: OAUTH_fetch_token_client_secret
    - matches: OAUTH_fetch_token_client_secret__with_Instance
  all:
    - not:
        inside:
          stopBy: end
          kind: ERROR
    - not:
        has:
          stopBy: end
          kind: ERROR
