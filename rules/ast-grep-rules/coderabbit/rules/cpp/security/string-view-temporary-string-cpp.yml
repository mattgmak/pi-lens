id: string-view-temporary-string-cpp
language: Cpp
severity: warning
message: >-
  This `std::string_view` is constructed from a temporary `std::string`. The `std::string` value is immeadiately
  destroyed after assignment and accessing data through the `std::string_view` will trigger a use-after-free.
note: |-
  [CWE-416] Use After Free. [REFERENCES]
      - https://wiki.sei.cmu.edu/confluence/display/cplusplus/MEM50-CPP.+Do+not+access+freed+memory
ast-grep-essentials: true
utils:
  VAR_std_to_string:
    kind: expression_statement
    has:
      stopBy: neighbor
      kind: assignment_expression
      all:
        - has:
            stopBy: neighbor
            kind: identifier
            regex: ^(string_view|wstring_view)$
        - has:
            stopBy: neighbor
            kind: call_expression
            all:
              - has:
                  stopBy: neighbor
                  kind: qualified_identifier
                  regex: ^std::to_string$
              - has:
                  stopBy: neighbor
                  kind: argument_list
  VAR_EXPR_substr:
    kind: expression_statement
    has:
      stopBy: neighbor
      kind: assignment_expression
      all:
        - has:
            stopBy: neighbor
            kind: identifier
            regex: ^(string_view|wstring_view)$
        - has:
            stopBy: neighbor
            kind: call_expression
            all:
              - has:
                  stopBy: neighbor
                  kind: field_expression
                  regex: ^(string.substr|wstring.substr)$
              - has:
                  stopBy: neighbor
                  kind: argument_list
