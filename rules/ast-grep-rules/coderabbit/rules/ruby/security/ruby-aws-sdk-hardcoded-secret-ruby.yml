id: ruby-aws-sdk-hardcoded-secret-ruby
language: ruby
severity: warning
message: >-
  A secret is hard-coded in the application. Secrets stored in source code, such as credentials, identifiers, and other
  types of sensitive data, can be leaked and used by internal or external malicious actors. Use environment variables to
  securely provide credentials and other secrets or retrieve them from a secure vault or Hardware Security Module (HSM).
note: |-
  [CWE-798] Use of Hard-coded Credentials. [REFERENCES]
      - https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html
ast-grep-essentials: true
utils:
  Aws_Credentials_new_X:
    kind: call
    all:
      - has:
          stopBy: neighbor
          kind: scope_resolution
          regex: ^Aws::Credentials$
      - has:
          stopBy: neighbor
          regex: ^.$
      - has:
          stopBy: neighbor
          kind: identifier
          regex: ^new$
      - has:
          stopBy: neighbor
          kind: argument_list
          has:
            stopBy: neighbor
            kind: string
            nthChild:
              position: 2
              ofRule:
                not:
                  kind: comment
          any:
            - has:
                nthChild: 1
                not:
                  kind: pair
                  has:
                    nthChild: 1
                    kind: hash_key_symbol
      - any:
          - inside:
              stopBy: end
              follows:
                stopBy: end
                kind: call
                pattern: require 'aws-sdk-core'
          - follows:
              stopBy: end
              kind: call
              pattern: require 'aws-sdk-core'
  Aws_Credentials_new_X__instance:
    kind: call
    all:
      - has:
          stopBy: neighbor
          kind: scope_resolution
          regex: ^Aws::Credentials$
      - has:
          stopBy: neighbor
          regex: ^.$
      - has:
          stopBy: neighbor
          kind: identifier
          regex: ^new$
      - has:
          stopBy: neighbor
          kind: argument_list
          has:
            stopBy: neighbor
            kind: identifier
            pattern: $VAR
            nthChild:
              position: 2
              ofRule:
                not:
                  kind: comment
          any:
            - has:
                nthChild: 1
                not:
                  kind: pair
                  has:
                    nthChild: 1
                    kind: hash_key_symbol
      - any:
          - follows:
              stopBy: end
              kind: assignment
              all:
                - has:
                    kind: identifier
                    pattern: $VAR
                - has:
                    kind: string
                    has:
                      kind: string_content
          - inside:
              stopBy: end
              follows:
                stopBy: end
                kind: assignment
                all:
                  - has:
                      kind: identifier
                      pattern: $VAR
                  - has:
                      kind: string
                      has:
                        kind: string_content
      - any:
          - inside:
              stopBy: end
              follows:
                stopBy: end
                kind: call
                pattern: require 'aws-sdk-core'
          - follows:
              stopBy: end
              kind: call
              pattern: require 'aws-sdk-core'
rule:
  kind: call
  any:
    - matches: Aws_Credentials_new_X
    - matches: Aws_Credentials_new_X__instance
  all:
    - not:
        has:
          stopBy: end
          kind: ERROR
    - not:
        inside:
          stopBy: end
          kind: ERROR
