id: ruby-faraday-hardcoded-secret-ruby
language: ruby
severity: warning
message: >-
  A secret is hard-coded in the application. Secrets stored in source code, such as credentials, identifiers, and other
  types of sensitive data, can be leaked and used by internal or external malicious actors. Use environment variables to
  securely provide credentials and other secrets or retrieve them from a secure vault or Hardware Security Module (HSM).
note: |-
  [CWE-798] Use of Hard-coded Credentials. [REFERENCES]
      - https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html
ast-grep-essentials: true
utils:
  X_request_authorization_basic_USER:
    kind: call
    all:
      - has:
          kind: identifier
          nthChild: 2
          regex: ^request$
      - has:
          kind: argument_list
          nthChild: 3
          all:
            - has:
                regex: ^:authorization$
                nthChild:
                  position: 1
                  ofRule:
                    not:
                      kind: comment
            - has:
                regex: ^:basic$
                nthChild:
                  position: 2
                  ofRule:
                    not:
                      kind: comment
            - has:
                any:
                  - kind: chained_string
                    has:
                      kind: string
                      has:
                        kind: string_content
                      nthChild:
                        position: 4
                        ofRule:
                          not:
                            kind: comment
                  - kind: string
                    has:
                      kind: string_content
                    nthChild:
                      position: 4
                      ofRule:
                        not:
                          kind: comment
            - not:
                has:
                  nthChild:
                    position: 5
                    ofRule:
                      not:
                        kind: comment
      - any:
          - inside:
              stopBy: end
              follows:
                stopBy: end
                kind: call
                pattern: require "faraday"
          - follows:
              stopBy: end
              kind: call
              pattern: require "faraday"
  Instance_X_request_authorization_basic_USER:
    kind: call
    all:
      - has:
          kind: identifier
          nthChild: 2
          regex: ^request$
      - has:
          kind: argument_list
          nthChild: 3
          all:
            - has:
                regex: ^:authorization$
                nthChild:
                  position: 1
                  ofRule:
                    not:
                      kind: comment
            - has:
                regex: ^:basic$
                nthChild:
                  position: 2
                  ofRule:
                    not:
                      kind: comment
            - has:
                pattern: $STRING
                kind: identifier
                nthChild:
                  position: 4
                  ofRule:
                    not:
                      kind: comment
            - not:
                has:
                  nthChild:
                    position: 5
                    ofRule:
                      not:
                        kind: comment
      - any:
          - inside:
              stopBy: end
              follows:
                stopBy: end
                kind: call
                pattern: require "faraday"
          - follows:
              stopBy: end
              kind: call
              pattern: require "faraday"
      - any:
          - follows:
              stopBy: end
              kind: assignment
              pattern: $STRING = $PASSWORD
          - inside:
              stopBy: end
              follows:
                stopBy: end
                kind: assignment
                pattern: $STRING = $PASSWORD
  X_request_basic_auth_USER:
    kind: call
    all:
      - has:
          kind: identifier
          nthChild: 2
          regex: ^request$
      - has:
          kind: argument_list
          nthChild: 3
          all:
            - has:
                regex: ^:basic_auth$
                nthChild:
                  position: 1
                  ofRule:
                    not:
                      kind: comment
            - has:
                any:
                  - kind: chained_string
                    has:
                      kind: string
                      has:
                        kind: string_content
                        position: 3
                        ofRule:
                          not:
                            kind: comment
                  - kind: string
                    has:
                      kind: string_content
                    nthChild:
                      position: 3
                      ofRule:
                        not:
                          kind: comment
            - not:
                has:
                  nthChild:
                    position: 4
                    ofRule:
                      not:
                        kind: comment
      - any:
          - follows:
              stopBy: end
              kind: call
              pattern: require "faraday"
          - inside:
              stopBy: end
              follows:
                stopBy: end
                kind: call
                pattern: require "faraday"
  Instance_X_request_basic_auth_USER:
    kind: call
    all:
      - has:
          kind: identifier
          nthChild: 2
          regex: ^request$
      - has:
          kind: argument_list
          nthChild: 3
          all:
            - has:
                regex: ^:basic_auth$
                nthChild:
                  position: 1
                  ofRule:
                    not:
                      kind: comment
            - has:
                kind: identifier
                pattern: $STRING
                nthChild:
                  position: 3
                  ofRule:
                    not:
                      kind: comment
            - not:
                has:
                  nthChild:
                    position: 4
                    ofRule:
                      not:
                        kind: comment
      - any:
          - follows:
              stopBy: end
              kind: call
              pattern: require "faraday"
          - inside:
              stopBy: end
              follows:
                stopBy: end
                kind: call
                pattern: require "faraday"
      - any:
          - follows:
              stopBy: end
              kind: assignment
              pattern: $STRING = $PASSWORD
          - inside:
              stopBy: end
              follows:
                stopBy: end
                kind: assignment
                pattern: $STRING = $PASSWORD
  X_request_token_auth:
    kind: call
    all:
      - has:
          kind: identifier
          nthChild: 2
          regex: ^request$
      - has:
          kind: argument_list
          nthChild: 3
          all:
            - has:
                regex: ^:token_auth$
                nthChild:
                  position: 1
                  ofRule:
                    not:
                      kind: comment
            - has:
                any:
                  - kind: chained_string
                    has:
                      kind: string
                      has:
                        kind: string_content
                        position: 2
                        ofRule: null
                        not:
                          kind: comment
                  - kind: string
                    has:
                      kind: string_content
                      position: 2
                      ofRule:
                        not:
                          kind: comment
      - any:
          - inside:
              stopBy: end
              follows:
                stopBy: end
                kind: call
                pattern: require "faraday"
          - follows:
              stopBy: end
              kind: call
              pattern: require "faraday"
  Instance_X_request_token_auth:
    kind: call
    all:
      - has:
          kind: identifier
          nthChild: 2
          regex: ^request$
      - has:
          kind: argument_list
          nthChild: 3
          all:
            - has:
                regex: ^:token_auth$
                nthChild:
                  position: 1
                  ofRule:
                    not:
                      kind: comment
            - has:
                kind: identifier
                pattern: $STRING
                nthChild:
                  position: 2
                  ofRule:
                    not:
                      kind: comment
      - any:
          - inside:
              stopBy: end
              follows:
                stopBy: end
                kind: call
                pattern: require "faraday"
          - follows:
              stopBy: end
              kind: call
              pattern: require "faraday"
      - any:
          - follows:
              stopBy: end
              kind: assignment
              pattern: $STRING = $PASSWORD
          - inside:
              stopBy: end
              follows:
                stopBy: end
                kind: assignment
                pattern: $STRING = $PASSWORD
  X_request_authorization_BEARER:
    kind: call
    all:
      - has:
          kind: identifier
          nthChild: 2
          regex: ^request$
      - has:
          kind: argument_list
          nthChild: 3
          all:
            - has:
                regex: ^:authorization$
                nthChild:
                  position: 1
                  ofRule:
                    not:
                      kind: comment
            - has:
                nthChild:
                  position: 2
                  ofRule:
                    not:
                      kind: comment
            - has:
                any:
                  - kind: chained_string
                    has:
                      kind: string
                      has:
                        kind: string_content
                      nthChild:
                        position: 3
                        ofRule:
                          not:
                            kind: comment
                  - kind: string
                    has:
                      kind: string_content
                    nthChild:
                      position: 3
                      ofRule:
                        not:
                          kind: comment
            - not:
                has:
                  nthChild:
                    position: 4
                    ofRule:
                      not:
                        kind: comment
      - any:
          - inside:
              stopBy: end
              follows:
                stopBy: end
                kind: call
                pattern: require "faraday"
          - follows:
              stopBy: end
              kind: call
              pattern: require "faraday"
  Instance_X_request_authorization_BEARER:
    kind: call
    all:
      - has:
          kind: identifier
          nthChild: 2
          regex: ^request$
      - has:
          kind: argument_list
          nthChild: 3
          all:
            - has:
                regex: ^:authorization$
                nthChild:
                  position: 1
                  ofRule:
                    not:
                      kind: comment
            - has:
                nthChild:
                  position: 2
                  ofRule:
                    not:
                      kind: comment
            - has:
                kind: identifier
                pattern: $STRING
                nthChild:
                  position: 3
                  ofRule:
                    not:
                      kind: comment
            - not:
                has:
                  nthChild:
                    position: 4
                    ofRule:
                      not:
                        kind: comment
      - any:
          - inside:
              stopBy: end
              follows:
                stopBy: end
                kind: call
                pattern: require "faraday"
          - follows:
              stopBy: end
              kind: call
              pattern: require "faraday"
      - any:
          - follows:
              stopBy: end
              kind: assignment
              pattern: $STRING = $PASSWORD
          - inside:
              stopBy: end
              follows:
                stopBy: end
                kind: assignment
                pattern: $STRING = $PASSWORD
rule:
  kind: call
  any:
    - matches: X_request_authorization_basic_USER
    - matches: Instance_X_request_authorization_basic_USER
    - matches: X_request_basic_auth_USER
    - matches: Instance_X_request_basic_auth_USER
    - matches: X_request_token_auth
    - matches: Instance_X_request_token_auth
    - matches: X_request_authorization_BEARER
    - matches: Instance_X_request_authorization_BEARER
  all:
    - not:
        has:
          stopBy: end
          kind: ERROR
    - not:
        inside:
          stopBy: end
          kind: ERROR
constraints:
  PASSWORD:
    kind: string
    has:
      kind: string_content
