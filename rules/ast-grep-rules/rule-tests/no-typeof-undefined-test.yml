id: no-typeof-undefined
valid:
  - 'x === undefined'
  - 'x !== undefined'
  - 'typeof __dirname !== "undefined"'
  - 'typeof __filename === "undefined"'
  - 'if (typeof window === "undefined") return;'
  - 'if (typeof document !== "undefined") document.title = "ready";'
  - 'if (typeof navigator !== "undefined") navigator.sendBeacon("/ready");'
  - 'if (typeof self !== "undefined") self.postMessage("ready");'
  - 'if (typeof location !== "undefined") location.reload();'
  - 'if (typeof localStorage !== "undefined") localStorage.getItem("ready");'
  - 'if (typeof sessionStorage !== "undefined") sessionStorage.getItem("ready");'
invalid:
  - 'typeof x === "undefined"'
  - 'typeof x !== "undefined"'
  - 'typeof y == "undefined"'
  - 'typeof y != "undefined"'
  - 'function check(value) { return typeof value === "undefined"; }'
