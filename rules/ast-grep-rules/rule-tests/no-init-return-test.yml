id: no-init-return
valid:
  - |
    class Foo:
        def __init__(self):
            self.x = 1
  - |
    class Foo:
        def __init__(self):
            return
  - |
    class Foo:
        def other(self):
            return 1
  - |
    def init_like():
        return 1
invalid:
  - |
    class Foo:
        def __init__(self):
            return 1
  - |
    class Foo:
        def __init__(self, x):
            return x
