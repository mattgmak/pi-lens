id: no-case-declarations-js
valid:
  - |
    switch (x) {
      case 1: {
        const y = 1;
        break;
      }
    }
  - |
    var z = 1; switch (x) { case 1: break; }
invalid:
  - |
    switch (x) {
      case 1:
        const y = 1;
        break;
    }
  - |
    switch (x) {
      case 1:
        let z = 1;
        break;
    }
