id: unchecked-throwing-call-python
valid:
  - |
    try:
        data = json.loads(raw)
    except json.JSONDecodeError:
        return None
  - |
    try:
        with open(path) as f:
            data = f.read()
    except OSError:
        return None
  - 'CONSTANT = 42'
invalid:
  - 'data = json.loads(raw)'
  - 'f = open(path)'
  - 'os.remove(path)'
  - 'os.stat(path)'
  - 'shutil.rmtree(path)'
  - 'int("42")'
  - 'float("3.14")'
  - 'int(user_input)'
