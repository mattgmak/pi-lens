id: no-hardcoded-password
valid:
  - |
    db = connect(user, password=os.environ["DB_PASSWORD"])
  - 'connect(user, password=PASSWORD)'
  - 'connect(user, password="")'
invalid:
  - 'connect("admin", password="s3cr3t-p4ss")'
  - 'db = connect(password="hunter2")'
  - 'connect(user, secret="my-secret-key")'
