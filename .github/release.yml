changelog:
  exclude:
    labels:
      - duplicate
      - invalid
      - question
      - wontfix
      - dependencies
    authors:
      - dependabot[bot]
  categories:
    - title: ⚠️ Breaking Changes
      labels:
        - breaking
    - title: 🚀 Features
      labels:
        - feature
    - title: 🔧 Enhancements
      labels:
        - enhancement
    - title: 🐛 Bug Fixes
      labels:
        - bug
    - title: 🛠 Maintenance
      labels:
        - area:tests
        - area:perf
        - area:observability
        - area:config
        - github_actions
    - title: 📝 Documentation
      labels:
        - documentation
    - title: Other Changes
      labels:
        - "*"
