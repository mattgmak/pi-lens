name: install-smoke

# Cross-platform / cross-package-manager install smoke for the extension, on
# real Linux + macOS runners. Two complementary jobs:
#
# - smoke:   packs the CURRENT repo, installs it under npm/pnpm/bun, and runs
#            scripts/install-selftest.mjs UNDER BUN. pi runs on Node, but Bun's
#            resolver is the strictest (it's where #285/#335's `ResolveMessage`
#            comes from), so the selftest force-imports the documented
#            failure-point modules (file-utils -> minimatch, complexity-client ->
#            typescript, bootstrap) and resolves the bare deps directly. No model.
#
# - pi-load: installs pi ITSELF the way users do (npm/pnpm/bun global + the curl
#            installer), `pi install npm:pi-lens` through pi's own installer +
#            npmCommand, then POSITIVELY confirms pi-lens loaded via RPC
#            (`get_commands` lists its lens-* commands; `extension_error` would
#            fire on failure). Also model-free.
#
# Together they reproduce the #285 (pnpm symlink store) / #335 (nested npm)
# conditions end to end. Resolution failures are hard failures; the build-script
# assets pnpm/bun skip (ast-grep CLI, tree-sitter grammars) are soft-warned.
#
# - mise-repro: the reporter's exact #285 combo — pi installed under a
#            mise-managed node + pnpm as npmCommand. mise layers a node install +
#            shim/realpath behavior on top of pnpm's isolated store, the one axis
#            the pi-load matrix never exercises. NON-BLOCKING (continue-on-error)
#            until the crash is reproduced/understood: a green run would be a false
#            "covered" signal, so it stays an investigation cell (it prints the
#            exact `typescript`-from-dist resolution that fails) rather than a gate.
#            Flip to a hard failure once #285 is fixed.

on:
  schedule:
    - cron: "0 6 * * *" # nightly 06:00 UTC
  workflow_dispatch: {}
  push:
    branches: [master]
    paths:
      - "package.json"
      - "package-lock.json"
      - "scripts/install-selftest.mjs"
      - "scripts/rpc-load-check.mjs"
      - ".github/workflows/install-smoke.yml"

permissions:
  contents: read

jobs:
  smoke:
    name: ${{ matrix.os }} · ${{ matrix.pm }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        pm: [npm, pnpm, bun, yarn]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"

      - name: Setup pnpm
        if: matrix.pm == 'pnpm'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: latest

      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Setup yarn (classic — hoists to node_modules like npm)
        if: matrix.pm == 'yarn'
        shell: bash
        run: npm i -g yarn@1

      - name: Build + pack the current repo
        shell: bash
        run: |
          set -euxo pipefail
          npm ci
          # prepare script builds dist; pack emits a tarball of the real files[] set
          TARBALL="$(npm pack --silent)"
          echo "TARBALL=$PWD/$TARBALL" >> "$GITHUB_ENV"

      - name: Install via ${{ matrix.pm }} into a clean project
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p "$RUNNER_TEMP/proj" && cd "$RUNNER_TEMP/proj"
          npm init -y >/dev/null
          # pnpm/bun exit non-zero when they BLOCK lifecycle scripts (the very
          # build-scripts gap we measure); that's expected, so don't let it fail
          # the step — the selftest below is the real gate.
          case "${{ matrix.pm }}" in
            npm)  npm  install "$TARBALL" ;;
            pnpm) pnpm add     "$TARBALL" || echo "::notice::pnpm exit $? (blocked build scripts — expected)" ;;
            bun)  bun  add     "$TARBALL" || echo "::notice::bun exit $? (blocked build scripts — expected)" ;;
            yarn) yarn add     "$TARBALL" || echo "::notice::yarn exit $? (build scripts / peer warnings — expected)" ;;
          esac
          # Record the installed layout for debugging (hoisted vs symlink store)
          echo "--- node_modules/pi-lens ---"
          ls -la node_modules/pi-lens >/dev/null 2>&1 && \
            { readlink node_modules/pi-lens || echo "(real dir)"; } || \
            find . -maxdepth 4 -name pi-lens -type d | head

      - name: Selftest under bun (strictest resolver)
        shell: bash
        run: |
          set -uxo pipefail
          cd "$RUNNER_TEMP/proj"
          SELFTEST="$(node -e 'console.log(require.resolve("pi-lens/scripts/install-selftest.mjs"))')"
          echo "running: bun $SELFTEST"
          bun "$SELFTEST" --allow-soft

  # Faithful end-to-end: install pi the way users do, then `pi install npm:pi-lens`
  # through pi's own installer + npmCommand, and positively confirm it loaded via
  # RPC. npmCommand is derived from the install method, so the pnpm cell drives
  # the pnpm symlink store (#285) end to end. Installs the PUBLISHED pi-lens (what
  # users get) — guards the shipped artifact; the `smoke` job guards current code.
  pi-load:
    name: pi-load · ${{ matrix.os }} · ${{ matrix.pi_install }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        pi_install: [npm-global, pnpm-global, bun-global, curl]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7 # for the RPC driver

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"

      - name: Setup pnpm
        if: matrix.pi_install == 'pnpm-global'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: latest

      - name: Setup bun
        if: matrix.pi_install == 'bun-global'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install pi (${{ matrix.pi_install }})
        shell: bash
        run: |
          set -uxo pipefail
          PKG="@earendil-works/pi-coding-agent"
          case "${{ matrix.pi_install }}" in
            npm-global)
              npm install -g --ignore-scripts "$PKG"
              echo "$(npm prefix -g)/bin" >> "$GITHUB_PATH"
              echo "NPMCMD=npm" >> "$GITHUB_ENV" ;;
            pnpm-global)
              # pnpm refuses `add -g` unless the global bin dir is ON PATH *now*
              # (GITHUB_PATH only affects later steps), so export it here too.
              export PNPM_HOME="$HOME/.pnpm-global"; mkdir -p "$PNPM_HOME"
              export PATH="$PNPM_HOME:$PATH"
              pnpm config set global-bin-dir "$PNPM_HOME"
              pnpm add -g "$PKG" || echo "::notice::pnpm add -g exit $? (blocked scripts?)"
              echo "$PNPM_HOME" >> "$GITHUB_PATH"
              echo "NPMCMD=pnpm" >> "$GITHUB_ENV" ;;
            bun-global)
              bun add -g "$PKG" || echo "::notice::bun blocked scripts (expected)"
              echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
              # pi-lens via npm here: `bun` is not a supported pi npmCommand value;
              # the bun-layout pi-lens resolution is covered by the smoke job.
              echo "NPMCMD=npm" >> "$GITHUB_ENV" ;;
            curl)
              # Download then run (no pipe → no SIGPIPE/pipefail abort); the
              # installer ultimately `npm install -g`s pi when Node is present.
              curl -fsSL --retry 3 --retry-delay 2 https://pi.dev/install.sh -o "$RUNNER_TEMP/pi-install.sh"
              sh "$RUNNER_TEMP/pi-install.sh" < /dev/null || echo "::notice::installer exit $? (verifying pi next)"
              echo "$(npm prefix -g)/bin" >> "$GITHUB_PATH"
              echo "$HOME/.local/bin" >> "$GITHUB_PATH"
              echo "NPMCMD=npm" >> "$GITHUB_ENV" ;;
          esac

      - name: Configure pi + install pi-lens (npmCommand=${{ env.NPMCMD }})
        shell: bash
        run: |
          set -uxo pipefail
          command -v pi
          pi --version
          mkdir -p "$HOME/.pi/agent"
          node -e 'const fs=require("fs"),os=require("os"),p=require("path");fs.writeFileSync(p.join(os.homedir(),".pi/agent/settings.json"),JSON.stringify({npmCommand:[process.env.NPMCMD],defaultProvider:"anthropic",defaultModel:"claude-sonnet-4-6"}))'
          pi install npm:pi-lens
          pi list | grep -i 'pi-lens' || { echo "::error::pi-lens not registered after install"; exit 1; }
          echo "layout: $(readlink -f "$HOME/.pi/agent/npm/node_modules/pi-lens" 2>/dev/null || echo '(real dir)')"

      - name: Verify pi-lens loads via RPC (get_commands — no model)
        shell: bash
        env:
          ANTHROPIC_API_KEY: sk-ant-dummy-ci-no-credits-needed
        run: |
          set -uo pipefail
          # Run from a clean git project; the driver spawns `pi --mode rpc`,
          # asserts pi-lens's lens-* commands registered, fails on extension_error.
          mkdir -p "$RUNNER_TEMP/proj" && cd "$RUNNER_TEMP/proj"
          git init -q; git config user.email t@t.t; git config user.name t
          printf 'export const x: number = 1;\n' > a.ts
          printf '{ "name": "d", "version": "1.0.0", "type": "module" }\n' > package.json
          git add -A && git commit -qm init
          node "$GITHUB_WORKSPACE/scripts/rpc-load-check.mjs" "$(command -v pi)"

  # Reproduces #285: pi installed via mise + pnpm as npmCommand → module-resolution
  # crash ("Cannot find package 'typescript' from …/pi-lens/dist/clients/…") behind
  # symlinks. mise adds a node install + shim realpath layer that the pi-load matrix
  # (npm/pnpm/bun global + curl) never covers. NON-BLOCKING investigation cell — see
  # the header note: a green run does NOT prove coverage, so this must not gate merges
  # until the crash is understood. Flip continue-on-error off once #285 is fixed.
  mise-repro:
    name: mise + pnpm repro (#285, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7 # RPC driver

      - name: Install mise
        shell: bash
        run: |
          set -uxo pipefail
          curl -fsSL https://mise.run | sh
          # Expose the mise binary AND its shim dir so later steps see the
          # mise-managed node/npm/pnpm/pi as shims (realpath-through-shim = the
          # #285 trigger). No `mise activate` — that PATH-injects the real bins and
          # would mask the shim behavior we are trying to reproduce.
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/share/mise/shims" >> "$GITHUB_PATH"

      - name: Provide node via mise
        shell: bash
        run: |
          set -uxo pipefail
          mise use -g node@22
          mise reshim
          echo "node -> $(command -v node)"
          echo "node realpath -> $(readlink -f "$(command -v node)")"
          node --version
          npm --version

      - name: Install pi + pnpm under the mise-managed node
        shell: bash
        run: |
          set -uxo pipefail
          # Both land in mise's node install dir; reshim exposes them as shims,
          # matching a user who did everything through mise.
          npm install -g --ignore-scripts @earendil-works/pi-coding-agent pnpm
          mise reshim
          command -v pi
          pi --version
          pnpm --version

      - name: Configure pi (npmCommand=pnpm) + install pi-lens
        shell: bash
        run: |
          set -uxo pipefail
          mkdir -p "$HOME/.pi/agent"
          node -e 'const fs=require("fs"),os=require("os"),p=require("path");fs.writeFileSync(p.join(os.homedir(),".pi/agent/settings.json"),JSON.stringify({npmCommand:["pnpm"],defaultProvider:"anthropic",defaultModel:"claude-sonnet-4-6"}))'
          pi install npm:pi-lens
          pi list | grep -i 'pi-lens' || { echo "::error::pi-lens not registered after install"; exit 1; }
          PILENS_DIR="$(readlink -f "$HOME/.pi/agent/npm/node_modules/pi-lens" 2>/dev/null || echo '')"
          echo "pi-lens layout: ${PILENS_DIR:-'(unresolved)'}"
          # Directly probe the resolution that crashes in #285: can `typescript`
          # (a real runtime dep) be resolved from pi-lens's compiled dist/clients?
          if [ -n "$PILENS_DIR" ] && [ -d "$PILENS_DIR/dist/clients" ]; then
            node -e "console.log('typescript ->', require.resolve('typescript', { paths: ['$PILENS_DIR/dist/clients'] }))" \
              || echo "::warning::typescript UNRESOLVABLE from pi-lens/dist/clients — this is #285"
          fi

      - name: Verify pi-lens loads via RPC (get_commands — no model)
        shell: bash
        env:
          ANTHROPIC_API_KEY: sk-ant-dummy-ci-no-credits-needed
        run: |
          set -uo pipefail
          mkdir -p "$RUNNER_TEMP/proj" && cd "$RUNNER_TEMP/proj"
          git init -q; git config user.email t@t.t; git config user.name t
          printf 'export const x: number = 1;\n' > a.ts
          printf '{ "name": "d", "version": "1.0.0", "type": "module" }\n' > package.json
          git add -A && git commit -qm init
          node "$GITHUB_WORKSPACE/scripts/rpc-load-check.mjs" "$(command -v pi)"
