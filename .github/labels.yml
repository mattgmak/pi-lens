- name: area:tests
  color: "0052cc"
  description: Test suite, harnesses, and coverage

# Triage / workflow labels
- name: duplicate
  color: cfd3d7
  description: Duplicate of an existing issue
- name: good first issue
  color: 7057ff
  description: Good for newcomers
- name: help wanted
  color: "008672"
  description: Extra attention is needed
- name: invalid
  color: e4e669
  description: This doesn't seem right
- name: question
  color: d876e3
  description: Further information is requested
- name: wontfix
  color: ffffff
  description: This won't be worked on
- name: breaking
  color: b60205
  description: Breaking change
