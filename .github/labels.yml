# Type labels
- name: bug
  color: d73a4a
  description: Something is broken / behaves wrong
- name: feature
  color: 0e8a16
  description: Net-new capability that did not exist before
- name: enhancement
  color: a2eeef
  description: Improve/harden/refactor/perf/test an existing capability
- name: documentation
  color: 0075ca
  description: Docs only

# Area labels
- name: area:config
  color: "0052cc"
  description: Configuration and project/global settings
- name: area:diagnostics
  color: "0052cc"
  description: Diagnostic model, surfacing, suppression, project-diagnostics
- name: area:dispatch
  color: "0052cc"
  description: Runners, linters, formatters
- name: area:installer
  color: "0052cc"
  description: Tool auto-install and binary fetch
- name: area:lsp
  color: "0052cc"
  description: Language servers and LSP lifecycle
- name: area:observability
  color: "0052cc"
  description: Telemetry, health, status, logging
- name: area:perf
  color: "0052cc"
  description: Performance and event-loop discipline
- name: area:project-intelligence
  color: "0052cc"
  description: Codebase model, scan, debt, ranking
- name: area:read-guard
  color: "0052cc"
  description: Read-guard and edit substrate
- name: area:security
  color: "0052cc"
  description: Security scanners, rules, and hardening
- name: area:session
  color: "0052cc"
